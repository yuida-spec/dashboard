<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive">
<title>プロジェクト・ダッシュボード</title>
<style>
:root{--bg:#faf9f5;--card:#fff;--ink:#23211c;--mut:#6b6862;--line:#e7e4dc;
--red:#c0392b;--redbg:#fadbd8;--amber:#b7950b;--amberbg:#fcf3cf;--green:#1e8449;--greenbg:#d5f5e3;--gray:#7f8c8d;--graybg:#eaecee;
--accent:#2c3e50;--col:#f3f1ea;}
@media(prefers-color-scheme:dark){:root{--bg:#1c1b18;--card:#26241f;--ink:#ece9e1;--mut:#9b978d;--line:#36342d;
--redbg:#3a1e1a;--amberbg:#322a12;--greenbg:#16301f;--graybg:#2a2c2d;--accent:#cdd6df;--col:#222019;}}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic UI",sans-serif;font-size:15px;line-height:1.6}
button{font-family:inherit}
.hidden{display:none!important}
#lock{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg);z-index:50}
.lockbox{width:100%;max-width:380px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px}
.lockbox h1{font-size:18px;margin:0 0 4px}
.lockbox p{font-size:13px;color:var(--mut);margin:0 0 16px}
.lockbox label{display:block;font-size:12px;color:var(--mut);margin:10px 0 4px}
.lockbox input{width:100%;height:42px;padding:0 12px;font-size:15px;border:1px solid var(--line);border-radius:9px;background:var(--bg);color:var(--ink)}
.lockbox textarea{width:100%;min-height:64px;padding:10px 12px;font-size:13px;border:1px solid var(--line);border-radius:9px;background:var(--bg);color:var(--ink);resize:vertical}
.btn{width:100%;height:44px;margin-top:16px;border:none;border-radius:9px;background:var(--accent);color:var(--bg);font-size:15px;font-weight:600;cursor:pointer}
.btn.sub{background:transparent;color:var(--mut);border:1px solid var(--line);height:38px;font-weight:400;font-size:13px;margin-top:8px}
.err{color:var(--red);font-size:13px;margin-top:10px;min-height:18px}
.hint{font-size:12px;color:var(--mut);margin-top:10px;line-height:1.5}
.hint a{color:var(--accent)}
header{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:10px}
header .ttl{font-size:17px;font-weight:600}
header .dt{font-size:13px;color:var(--mut);font-weight:400}
header .grow{flex:1}
.status{font-size:12px;color:var(--mut);min-width:62px;text-align:right}
.status.dirty{color:var(--amber)}.status.ok{color:var(--green)}.status.err{color:var(--red)}
.iconbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:8px;height:34px;padding:0 12px;font-size:13px;cursor:pointer}
#board{display:flex;gap:14px;padding:14px 16px 60px;overflow-x:auto;align-items:flex-start;min-height:calc(100% - 60px)}
.col{background:var(--col);border-radius:14px;padding:10px;width:280px;flex:0 0 280px}
.colhead{display:flex;align-items:center;gap:6px;margin:2px 2px 10px}
.colname{flex:1;font-size:14px;font-weight:600;color:var(--mut);outline:none;border-radius:6px;padding:2px 4px}
.colname:focus{background:var(--card)}
.ccount{font-size:11px;background:var(--card);color:var(--mut);border-radius:20px;padding:1px 8px}
.xbtn{border:none;background:transparent;color:var(--mut);cursor:pointer;font-size:15px;line-height:1;padding:2px 4px;border-radius:6px;opacity:.5}
.xbtn:hover{opacity:1;color:var(--red)}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:9px;border-left:4px solid var(--gray)}
.card.green{border-left-color:var(--green)}.card.amber{border-left-color:var(--amber)}.card.red{border-left-color:var(--red)}.card.gray{border-left-color:var(--gray)}
.cardhead{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.mname{flex:1;font-size:14px;font-weight:600;outline:none;border-radius:6px;padding:2px 4px}
.mname:focus{background:var(--bg)}
.pill{font-size:11px;padding:2px 9px;border-radius:20px;cursor:pointer;white-space:nowrap;user-select:none}
.card.green .pill{background:var(--greenbg);color:var(--green)}.card.amber .pill{background:var(--amberbg);color:var(--amber)}.card.red .pill{background:var(--redbg);color:var(--red)}.card.gray .pill{background:var(--graybg);color:var(--gray)}
.todos{list-style:none;margin:4px 0 0;padding:0}
.td{display:flex;align-items:flex-start;gap:7px;font-size:13.5px;padding:3px 0}
.ck{flex:none;width:15px;height:15px;margin-top:3px;cursor:pointer;accent-color:var(--green)}
.ttext{flex:1;outline:none;border-radius:6px;padding:1px 3px;word-break:break-word}
.ttext:focus{background:var(--bg)}
.td.done .ttext{color:var(--mut);text-decoration:line-through}
.due{font-size:11px;color:var(--mut);cursor:pointer;white-space:nowrap;margin-top:2px;border:1px dashed var(--line);border-radius:6px;padding:0 5px}
.due.set{border-style:solid}
.due.over{color:var(--red);border-color:var(--red);font-weight:600}
.flag{flex:none;cursor:pointer;font-size:13px;margin-top:1px;color:var(--line);user-select:none}
.flag.on{color:var(--red)}
.tdx{flex:none;border:none;background:transparent;color:var(--mut);cursor:pointer;opacity:.4;font-size:13px;margin-top:1px}
.tdx:hover{opacity:1;color:var(--red)}
.addtodo{margin-top:6px;font-size:12px;color:var(--mut);background:transparent;border:1px dashed var(--line);border-radius:7px;padding:4px 8px;cursor:pointer;width:100%}
.addcard{width:100%;margin-top:4px;font-size:13px;color:var(--mut);background:transparent;border:none;border-radius:8px;padding:7px;cursor:pointer;text-align:left}
.addcard:hover{background:var(--card)}
.addcol{flex:0 0 220px;background:transparent;border:1px dashed var(--line);border-radius:14px;color:var(--mut);font-size:14px;padding:14px;cursor:pointer;height:54px}
.sortghost{opacity:.4}
.draghandle{cursor:grab;color:var(--mut);opacity:.4;font-size:14px;flex:none}
#modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:20px;z-index:60}
.modalbox{width:100%;max-width:400px;background:var(--card);border-radius:14px;padding:20px}
.modalbox h2{font-size:16px;margin:0 0 12px}
.modalbox label{display:block;font-size:12px;color:var(--mut);margin:10px 0 4px}
.modalbox input{width:100%;height:40px;padding:0 12px;font-size:14px;border:1px solid var(--line);border-radius:9px;background:var(--bg);color:var(--ink)}
.modalbox .row{display:flex;gap:8px;margin-top:16px}
.modalbox .row .btn{margin-top:0}
</style>
</head>
<body>

<div id="lock">
  <div class="lockbox">
    <h1 id="lockTitle">ロック中</h1>
    <p id="lockDesc">合言葉を入力してください。</p>
    <div id="passWrap">
      <label>合言葉（パスフレーズ）</label>
      <input id="pass" type="password" autocomplete="off" inputmode="text">
    </div>
    <div id="pass2Wrap" class="hidden">
      <label>合言葉（確認のためもう一度）</label>
      <input id="pass2" type="password" autocomplete="off">
    </div>
    <div id="tokenWrap" class="hidden">
      <label>GitHub アクセストークン（初回のみ）</label>
      <textarea id="token" placeholder="github_pat_..."></textarea>
      <div class="hint" id="tokenHint"></div>
    </div>
    <button class="btn" id="unlockBtn">開く</button>
    <div class="err" id="lockErr"></div>
  </div>
</div>

<header class="hidden" id="hdr">
  <span class="ttl">ダッシュボード <span class="dt" id="hdrDate"></span></span>
  <span class="grow"></span>
  <span class="status" id="status"></span>
  <button class="iconbtn" id="refreshBtn" title="最新を取得">&#8635;</button>
  <button class="iconbtn" id="settingsBtn">設定</button>
</header>

<div id="board" class="hidden"></div>

<div id="modal" class="hidden">
  <div class="modalbox">
    <h2>設定</h2>
    <label>GitHub アクセストークン（更新する場合のみ入力）</label>
    <input id="mToken" type="password" placeholder="変更しない場合は空のまま">
    <label>合言葉を変更（新しい合言葉。空なら変更なし）</label>
    <input id="mPass" type="password" placeholder="変更しない場合は空のまま">
    <div class="row">
      <button class="btn sub" id="mCancel" style="margin-top:0">閉じる</button>
      <button class="btn" id="mSave">保存</button>
    </div>
    <div class="err" id="mErr"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.6/Sortable.min.js"></script>
<script>
const REPO="yuida-spec/dashboard";
const API="https://api.github.com/repos/"+REPO;
const ITER=150000;
const STATUSES=["green","amber","red","gray"];
const SLABEL={green:"順調",amber:"詰まり",red:"要対応",gray:"様子見"};

function id(){return Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-3)}
function $(s){return document.querySelector(s)}

const DEFAULT_DATA={columns:[
 {id:id(),name:"エイトハンドレッド / マクロミル",cards:[
   {id:id(),name:"マクロミル営業改革",status:"amber",todos:[
     {id:id(),text:"佐々木社長向けたたき台を仕上げる",done:false,pri:true,due:"7/3"},
     {id:id(),text:"関与50%・月250万フィーの条件を文面で確認",done:false,pri:false,due:""}]}]},
 {id:id(),name:"AIコンサル",cards:[
   {id:id(),name:"ダスキン",status:"green",todos:[{id:id(),text:"提案書ドラフトを送付",done:false,pri:false,due:""}]},
   {id:id(),name:"大善",status:"green",todos:[{id:id(),text:"次回ミーティングの日程調整",done:false,pri:false,due:""}]},
   {id:id(),name:"宣伝会議",status:"green",todos:[{id:id(),text:"請求書を発行",done:false,pri:false,due:""}]},
   {id:id(),name:"PEAK",status:"green",todos:[{id:id(),text:"月次レポートを共有",done:false,pri:false,due:""}]}]},
 {id:id(),name:"サンダー",cards:[
   {id:id(),name:"インフ",status:"green",todos:[{id:id(),text:"要件ヒアリングを実施",done:false,pri:false,due:""}]}]},
 {id:id(),name:"LMC",cards:[
   {id:id(),name:"マクアケ",status:"amber",todos:[{id:id(),text:"ページ構成案を作る",done:false,pri:true,due:""}]},
   {id:id(),name:"アフィリエイト",status:"amber",todos:[{id:id(),text:"ASPを選定",done:false,pri:false,due:""}]},
   {id:id(),name:"ビジネスケース",status:"green",todos:[{id:id(),text:"数値モデルを更新",done:false,pri:false,due:""}]}]}
]};

let state=null, KEY=null, TOKEN=null, SALT=null, SHA=null, saveTimer=null, isNew=false;

function bytesToB64(bytes){let s="";for(let i=0;i<bytes.length;i++)s+=String.fromCharCode(bytes[i]);return btoa(s)}
function b64ToBytes(b64){const s=atob(b64.replace(/\s/g,""));const a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a}
function strToB64(str){return bytesToB64(new TextEncoder().encode(str))}
function b64ToStr(b64){return new TextDecoder().decode(b64ToBytes(b64))}

async function deriveKey(pass,salt){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pass),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:ITER,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);
}
async function encStr(key,obj){
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=new Uint8Array(await crypto.subtle.encrypt({name:"AES-GCM",iv},key,new TextEncoder().encode(JSON.stringify(obj))));
  return bytesToB64(iv)+"."+bytesToB64(ct);
}
async function decStr(key,str){
  const p=str.split(".");
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(p[0])},key,b64ToBytes(p[1]));
  return JSON.parse(new TextDecoder().decode(pt));
}

async function ghGetVault(auth){
  const h={"Accept":"application/vnd.github+json"};
  if(auth&&TOKEN)h["Authorization"]="Bearer "+TOKEN;
  const r=await fetch(API+"/contents/vault.json?ref=main&t="+Date.now(),{headers:h,cache:"no-store"});
  if(r.status===404)return null;
  if(!r.ok)throw new Error("読込失敗("+r.status+")");
  const j=await r.json();
  SHA=j.sha;
  return JSON.parse(b64ToStr(j.content));
}
async function putRaw(vault){
  const body={message:"update dashboard",content:strToB64(JSON.stringify(vault)),branch:"main"};
  if(SHA)body.sha=SHA;
  return fetch(API+"/contents/vault.json",{method:"PUT",headers:{"Authorization":"Bearer "+TOKEN,"Accept":"application/vnd.github+json","Content-Type":"application/json"},body:JSON.stringify(body)});
}
async function ghPutVault(vault){
  let r=await putRaw(vault);
  if(r.status===409){await ghGetVault(true);r=await putRaw(vault);}
  if(!r.ok){let m="";try{m=(await r.json()).message||""}catch(e){} throw new Error("保存失敗("+r.status+") "+m)}
  SHA=(await r.json()).content.sha;
}
async function buildVault(){
  return {salt:bytesToB64(SALT), data:await encStr(KEY,state), token:await encStr(KEY,TOKEN)};
}
function setStatus(t,cls){const s=$("#status");s.textContent=t;s.className="status"+(cls?" "+cls:"")}
function markDirty(){setStatus("未保存","dirty");clearTimeout(saveTimer);saveTimer=setTimeout(save,1400)}
async function save(){
  if(!KEY||!TOKEN)return;
  setStatus("保存中…");
  try{await ghPutVault(await buildVault());setStatus("保存済み","ok")}
  catch(e){setStatus("保存エラー","err");console.error(e);alert("保存に失敗しました: "+e.message)}
}

function todayMD(){const d=new Date();return [d.getMonth()+1,d.getDate()]}
function isOverdue(due){if(!due)return false;const m=due.match(/^(\d{1,2})\/(\d{1,2})$/);if(!m)return false;const t=todayMD();return (+m[1]*100+ +m[2]) < (t[0]*100+t[1])}
function elcard(card,col){
  const div=document.createElement("div");div.className="card "+card.status;div.dataset.id=card.id;
  const head=document.createElement("div");head.className="cardhead";
  head.innerHTML='<span class="draghandle">&#10303;</span><span class="mname" contenteditable spellcheck="false"></span><span class="pill"></span><button class="xbtn" title="削除">&times;</button>';
  const mn=head.querySelector(".mname");mn.textContent=card.name;
  mn.addEventListener("blur",e=>{card.name=e.target.textContent.trim()||"無題";markDirty()});
  const pill=head.querySelector(".pill");pill.textContent=SLABEL[card.status];
  pill.addEventListener("click",()=>{card.status=STATUSES[(STATUSES.indexOf(card.status)+1)%4];render()});
  head.querySelector(".xbtn").addEventListener("click",()=>{if(confirm("「"+card.name+"」を削除しますか？")){col.cards=col.cards.filter(c=>c!==card);render()}});
  div.appendChild(head);
  const ul=document.createElement("ul");ul.className="todos";
  card.todos.forEach(td=>ul.appendChild(eltodo(td,card)));
  div.appendChild(ul);
  const add=document.createElement("button");add.className="addtodo";add.textContent="+ TODO";
  add.addEventListener("click",()=>{const t={id:id(),text:"",done:false,pri:false,due:""};card.todos.push(t);render();setTimeout(()=>{const e=document.querySelector('[data-tid="'+t.id+'"] .ttext');if(e)e.focus()},30)});
  div.appendChild(add);
  return div;
}
function eltodo(td,card){
  const li=document.createElement("li");li.className="td"+(td.done?" done":"");li.dataset.tid=td.id;
  const ck=document.createElement("input");ck.type="checkbox";ck.className="ck";ck.checked=td.done;
  ck.addEventListener("change",()=>{td.done=ck.checked;render()});
  const flag=document.createElement("span");flag.className="flag"+(td.pri?" on":"");flag.textContent="★";flag.title="最優先";
  flag.addEventListener("click",()=>{td.pri=!td.pri;render()});
  const tx=document.createElement("span");tx.className="ttext";tx.contentEditable=true;tx.spellcheck=false;tx.textContent=td.text;
  tx.addEventListener("blur",e=>{td.text=e.target.textContent.trim();markDirty()});
  const due=document.createElement("span");due.className="due"+(td.due?" set":"")+(isOverdue(td.due)?" over":"");due.textContent=td.due||"期日";
  due.addEventListener("click",()=>{const v=prompt("期日（例 7/3、空欄で削除）",td.due||"");if(v!==null){td.due=v.trim();render()}});
  const x=document.createElement("button");x.className="tdx";x.textContent="×";
  x.addEventListener("click",()=>{card.todos=card.todos.filter(t=>t!==td);render()});
  li.append(ck,flag,tx,due,x);
  return li;
}
function elcol(col){
  const sec=document.createElement("section");sec.className="col";sec.dataset.id=col.id;
  const head=document.createElement("div");head.className="colhead";
  head.innerHTML='<span class="colname" contenteditable spellcheck="false"></span><span class="ccount"></span><button class="xbtn" title="箱を削除">&times;</button>';
  const cn=head.querySelector(".colname");cn.textContent=col.name;
  cn.addEventListener("blur",e=>{col.name=e.target.textContent.trim()||"無題";markDirty()});
  head.querySelector(".ccount").textContent=col.cards.length;
  head.querySelector(".xbtn").addEventListener("click",()=>{if(confirm("箱「"+col.name+"」を中身ごと削除しますか？")){state.columns=state.columns.filter(c=>c!==col);render()}});
  sec.appendChild(head);
  const list=document.createElement("div");list.className="cardlist";list.dataset.col=col.id;
  col.cards.forEach(card=>list.appendChild(elcard(card,col)));
  sec.appendChild(list);
  const add=document.createElement("button");add.className="addcard";add.textContent="+ プロジェクトを追加";
  add.addEventListener("click",()=>{const c={id:id(),name:"新規プロジェクト",status:"gray",todos:[]};col.cards.push(c);render();setTimeout(()=>{const e=document.querySelector('[data-id="'+c.id+'"] .mname');if(e)e.focus()},30)});
  sec.appendChild(add);
  return sec;
}
function render(){
  const board=$("#board");board.innerHTML="";
  state.columns.forEach(col=>board.appendChild(elcol(col)));
  const addcol=document.createElement("button");addcol.className="addcol";addcol.textContent="＋ 大カテゴリを追加";
  addcol.addEventListener("click",()=>{state.columns.push({id:id(),name:"新規カテゴリ",cards:[]});render()});
  board.appendChild(addcol);
  setupDrag();
  markDirty();
}
function setupDrag(){
  document.querySelectorAll(".cardlist").forEach(list=>{
    new Sortable(list,{group:"cards",animation:140,handle:".draghandle",ghostClass:"sortghost",onEnd:syncFromDOM});
  });
}
function syncFromDOM(){
  const map={};state.columns.forEach(col=>col.cards.forEach(c=>map[c.id]=c));
  state.columns.forEach(col=>{
    const list=document.querySelector('.cardlist[data-col="'+col.id+'"]');
    if(!list)return;
    col.cards=[...list.querySelectorAll(".card")].map(el=>map[el.dataset.id]).filter(Boolean);
  });
  render();
}

async function init(){
  const d=new Date();const w=["日","月","火","水","木","金","土"][d.getDay()];
  $("#hdrDate").textContent=(d.getMonth()+1)+"/"+d.getDate()+"（"+w+"）";
  let vault=null;
  try{vault=await ghGetVault(false)}catch(e){}
  if(vault){
    isNew=false;
    $("#lockTitle").textContent="ロック中";
    $("#lockDesc").textContent="合言葉を入力して開いてください。";
  }else{
    isNew=true;
    $("#lockTitle").textContent="初期設定";
    $("#lockDesc").textContent="初回設定です。合言葉を決め、GitHubトークンを貼り付けてください。";
    $("#pass2Wrap").classList.remove("hidden");
    $("#tokenWrap").classList.remove("hidden");
    $("#tokenHint").innerHTML="トークンは GitHub の Settings → Developer settings → Fine-grained tokens で発行（このリポジトリの <b>Contents: Read and write</b>）。合言葉で暗号化して保存します。";
  }
  $("#unlockBtn").addEventListener("click",()=>doUnlock(vault));
  $("#pass").addEventListener("keydown",e=>{if(e.key==="Enter"&&!isNew)doUnlock(vault)});
}
async function doUnlock(vault){
  const err=$("#lockErr");err.textContent="";
  const pass=$("#pass").value;
  if(!pass){err.textContent="合言葉を入力してください。";return}
  $("#unlockBtn").disabled=true;
  try{
    if(isNew){
      if(pass!==$("#pass2").value){err.textContent="合言葉が一致しません。";$("#unlockBtn").disabled=false;return}
      const tk=$("#token").value.trim();
      if(!tk){err.textContent="GitHubトークンを貼り付けてください。";$("#unlockBtn").disabled=false;return}
      SALT=crypto.getRandomValues(new Uint8Array(16));
      KEY=await deriveKey(pass,SALT);
      TOKEN=tk; state=DEFAULT_DATA;
      await ghPutVault(await buildVault());
    }else{
      SALT=b64ToBytes(vault.salt);
      KEY=await deriveKey(pass,SALT);
      try{state=await decStr(KEY,vault.data);TOKEN=await decStr(KEY,vault.token);}
      catch(e){err.textContent="合言葉が違います。";$("#unlockBtn").disabled=false;return}
    }
  }catch(e){err.textContent="エラー: "+e.message;$("#unlockBtn").disabled=false;return}
  $("#lock").classList.add("hidden");
  $("#hdr").classList.remove("hidden");
  $("#board").classList.remove("hidden");
  render();
  setStatus("保存済み","ok");
}

$("#refreshBtn").addEventListener("click",async()=>{
  setStatus("取得中…");
  try{const v=await ghGetVault(true);if(v){state=await decStr(KEY,v.data);render();setStatus("最新に更新","ok")}}
  catch(e){setStatus("取得エラー","err")}
});
$("#settingsBtn").addEventListener("click",()=>{$("#mToken").value="";$("#mPass").value="";$("#mErr").textContent="";$("#modal").classList.remove("hidden")});
$("#mCancel").addEventListener("click",()=>$("#modal").classList.add("hidden"));
$("#mSave").addEventListener("click",async()=>{
  const nt=$("#mToken").value.trim(), np=$("#mPass").value;
  try{
    if(nt)TOKEN=nt;
    if(np){SALT=crypto.getRandomValues(new Uint8Array(16));KEY=await deriveKey(np,SALT);}
    await ghPutVault(await buildVault());
    $("#modal").classList.add("hidden");setStatus("保存済み","ok");
  }catch(e){$("#mErr").textContent="保存失敗: "+e.message}
});

init();
</script>
</body>
</html>
